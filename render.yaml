services:
  - type: web
    name: pc-compat-engine
    env: python
    buildCommand: pip install -r requirements_render.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120 --workers 1
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false   # Renderダッシュボードで手動設定してください
      - key: AMAZON_TAG
        sync: false   # Amazonアソシエイト承認後に設定（例: yourname-22）
