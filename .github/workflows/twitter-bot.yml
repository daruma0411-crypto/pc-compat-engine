name: Twitter Bot - Auto Post
on:
    schedule:
      - cron: '0 9 * * *'   # 18:00 JST（1日1回、濃い投稿）
    workflow_dispatch:

concurrency:
  group: twitter-bot-push
  cancel-in-progress: false

jobs:
    post:
      runs-on: ubuntu-latest
      permissions:
        contents: write

      steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system fonts (Noto Sans CJK)
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: Install dependencies
        run: |
          pip install tweepy Pillow requests

      - name: Random delay (0-30 minutes for humanization)
        run: |
          DELAY=$((RANDOM % 1800))
          echo "Waiting ${DELAY} seconds for humanization..."
          sleep $DELAY

      - name: Post to Twitter
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
        run: |
          python scripts/twitter_bot.py

      - name: Commit and push history (with retry)
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add scripts/twitter_post_history.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git stash
          for i in 1 2 3; do
            git pull --rebase origin main || true
            git stash pop || true
            git add scripts/twitter_post_history.json
            git diff --cached --quiet || git commit -m "Update Twitter post history [skip ci]"
            if git push; then
              echo "Push succeeded on attempt $i"
              exit 0
            fi
            echo "Push failed on attempt $i, retrying..."
            sleep 5
            git stash
          done
          echo "Push failed after 3 attempts"
          exit 1
