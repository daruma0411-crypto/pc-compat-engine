name: Twitter Bot - Auto Post
on:
    schedule:
      - cron: '0 3,9,12 * * *'
    workflow_dispatch:
jobs:
    post:
      runs-on: ubuntu-latest
      permissions:
        contents: write

      steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system fonts (Noto Sans CJK)
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      - name: Install dependencies
        run: |
          pip install tweepy Pillow

      - name: Post to Twitter
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
        run: |
          python scripts/twitter_bot.py

      - name: Commit history
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add scripts/twitter_post_history.json
          git diff --cached --quiet || git commit -m "Update Twitter post history [skip ci]"
          git push
