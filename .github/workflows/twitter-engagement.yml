name: Twitter Engagement Bot

  on:
    schedule:
      - cron: '0 0,12 * * *'
    workflow_dispatch:

  jobs:
    auto-follow:
      runs-on: ubuntu-latest
      permissions:
        contents: write

      steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Setup Python
          uses: actions/setup-python@v5
          with:
            python-version: '3.11'

        - name: Install dependencies
          run: |
            pip install tweepy

        - name: Run Auto Follow Bot
          env:
            TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
            TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
            TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
            TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
            TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          run: |
            python scripts/twitter_auto_follow.py

        - name: Commit follow history
          run: |
            git config user.name "GitHub Actions Bot"
            git config user.email "actions@github.com"
            git add scripts/twitter_follow_history.json
            git diff --cached --quiet || git commit -m "Update Twitter follow history [skip ci]"
            git push

    auto-reply:
      runs-on: ubuntu-latest
      permissions:
        contents: write

      steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Setup Python
          uses: actions/setup-python@v5
          with:
            python-version: '3.11'

        - name: Install dependencies
          run: |
            pip install tweepy

        - name: Run Auto Reply Bot
          env:
            TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
            TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
            TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
            TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
            TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          run: |
            python scripts/twitter_auto_reply.py

        - name: Commit reply history
          run: |
            git config user.name "GitHub Actions Bot"
            git config user.email "actions@github.com"
            git add scripts/twitter_reply_history.json
            git diff --cached --quiet || git commit -m "Update Twitter reply history [skip ci]"
            git push
