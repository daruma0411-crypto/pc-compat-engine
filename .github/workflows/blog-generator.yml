name: Blog Generator - Daily

on:
  schedule:
    # 毎日 JST 06:00 (UTC 21:00前日)
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  generate-blog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install anthropic requests beautifulsoup4 python-dotenv
      
      - name: Generate blog post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: |
          python scripts/blog_generator.py --count 1
      
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add static/blog/
          git diff --cached --quiet || git commit -m "🤖 Daily blog post generated"
          git push
