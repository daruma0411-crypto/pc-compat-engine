name: Weekly Price Update
on:
  schedule:
    - cron: '0 21 * * 6'  # 毎週土曜 21:00 UTC = 日曜 06:00 JST
  workflow_dispatch:       # 手動実行可

jobs:
  update-category:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      matrix:
        category: [gpu, ram, cpu, mb, psu, case, cooler]
      fail-fast: false
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run price updater (${{ matrix.category }})
      run: python scripts/kakaku_price_updater.py --category ${{ matrix.category }}

    - name: Commit and push
      run: |
        git config user.name "GitHub Actions Bot"
        git config user.email "actions@github.com"
        # 並列pushの競合対策: stash + rebase + リトライ5回
        for i in 1 2 3 4 5; do
          git add workspace/data/
          if git diff --cached --quiet; then
            echo "No changes for ${{ matrix.category }}"
            exit 0
          fi
          git stash
          git pull --rebase origin main || true
          git stash pop || true
          git add workspace/data/
          git commit -m "auto: price update ${{ matrix.category }} $(date +%Y-%m-%d)" || true
          if git push; then
            echo "Push OK: ${{ matrix.category }}"
            exit 0
          fi
          echo "Push failed (attempt $i), retrying..."
          git reset --soft HEAD~1 || true
          sleep $((RANDOM % 15 + i * 5))
        done
        echo "Failed to push after 5 attempts"
        exit 1
