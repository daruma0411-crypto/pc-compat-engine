name: Weekly Price Update
on:
  schedule:
    - cron: '0 21 * * 0'  # 毎週日曜 06:00 JST
  workflow_dispatch:       # 手動実行可

jobs:
  update-category:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      matrix:
        category: [gpu, ram, cpu, mb, psu, case, cooler]
      fail-fast: false
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run price updater (${{ matrix.category }})
      run: python scripts/kakaku_price_updater.py --category ${{ matrix.category }}

    - name: Commit and push
      run: |
        git config user.name "GitHub Actions Bot"
        git config user.email "actions@github.com"
        git add workspace/data/
        if git diff --cached --quiet; then
          echo "No changes for ${{ matrix.category }}"
          exit 0
        fi
        # 並列pushの競合対策: リトライ3回
        for i in 1 2 3; do
          git pull --rebase origin main || true
          git commit -m "auto: price update ${{ matrix.category }} $(date +%Y-%m-%d)" || true
          if git push; then
            echo "Push OK: ${{ matrix.category }}"
            exit 0
          fi
          echo "Push failed (attempt $i), retrying in $((i * 10))s..."
          git reset HEAD~1 2>/dev/null || true
          sleep $((i * 10))
          git add workspace/data/
        done
        echo "Failed to push after 3 attempts"
        exit 1
