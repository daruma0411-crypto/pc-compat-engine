name: Weekly Price Update
on:
  schedule:
    - cron: '0 21 * * 0'  # 毎週日曜 06:00 JST
  workflow_dispatch:       # 手動実行可

jobs:
  update-prices:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run price updater
      run: python scripts/kakaku_price_updater.py

    - name: Commit and push
      run: |
        git config user.name "GitHub Actions Bot"
        git config user.email "actions@github.com"
        git pull --rebase origin main || true
        git add workspace/data/
        git diff --cached --quiet || git commit -m "auto: weekly price update $(date +%Y-%m-%d)"
        git push
