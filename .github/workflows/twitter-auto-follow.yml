name: Twitter Auto Follow Bot
on:
    schedule:
      - cron: '0 7 * * *'            # 毎日 16:00 JST
    workflow_dispatch:
jobs:
    follow:
      runs-on: ubuntu-latest
      permissions:
        contents: write

      steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install tweepy

      - name: Random delay (0-30 minutes for humanization)
        run: |
          DELAY=$((RANDOM % 1800))
          echo "Waiting ${DELAY} seconds for humanization..."
          sleep $DELAY

      - name: Run Auto Follow Bot
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: |
          cd scripts
          python twitter_auto_follow.py

      - name: Commit follow history
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git pull --rebase origin main || true
          git add scripts/twitter_follow_history.json
          git diff --cached --quiet || git commit -m "Update follow history [skip ci]"
          git push
