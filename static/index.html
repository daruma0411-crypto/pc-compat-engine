<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PC パーツ互換チェッカー</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --c-ok:      #16a34a;
    --c-ok-bg:   #f0fdf4;
    --c-warn:    #ca8a04;
    --c-warn-bg: #fefce8;
    --c-ng:      #dc2626;
    --c-ng-bg:   #fef2f2;
    --c-unk:     #6b7280;
    --c-unk-bg:  #f9fafb;
    --c-primary: #4f46e5;
    --c-surface: #ffffff;
    --c-border:  #e5e7eb;
    --c-text:    #111827;
    --c-muted:   #6b7280;
    --radius:    12px;
    --shadow:    0 1px 3px rgba(0,0,0,.08), 0 4px 12px rgba(0,0,0,.06);
  }

  html, body {
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", sans-serif;
    background: #f3f4f6;
    color: var(--c-text);
  }

  /* ── アプリシェル ── */
  .app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 720px;
    margin: 0 auto;
    background: #f3f4f6;
  }

  /* ── ヘッダー ── */
  header {
    flex-shrink: 0;
    background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
    color: #fff;
    padding: 16px 20px 14px;
    text-align: center;
    box-shadow: 0 2px 8px rgba(79,70,229,.3);
  }
  header h1 { font-size: clamp(15px, 4vw, 20px); font-weight: 700; letter-spacing: -.02em; }
  header p  { margin-top: 3px; font-size: 12px; opacity: .8; }

  /* ── チャット欄 ── */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px 8px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* ── メッセージバブル ── */
  .msg {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    animation: fadeUp .2s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .msg.ai   { align-self: flex-start; max-width: 90%; }
  .msg.user { align-self: flex-end;   max-width: 80%; flex-direction: row-reverse; }

  .msg-avatar {
    width: 30px; height: 30px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
    background: linear-gradient(135deg, #4f46e5, #7c3aed);
    color: #fff;
  }
  .msg.user .msg-avatar { background: #d1d5db; }

  .msg-bubble {
    background: var(--c-surface);
    border-radius: 16px;
    padding: 10px 14px;
    font-size: 14px;
    line-height: 1.6;
    box-shadow: var(--shadow);
    word-break: break-word;
  }
  .msg.ai   .msg-bubble { border-bottom-left-radius: 4px; }
  .msg.user .msg-bubble {
    border-bottom-right-radius: 4px;
    background: var(--c-primary);
    color: #fff;
  }

  /* タイピングアニメーション */
  .typing-indicator {
    display: flex;
    gap: 4px;
    padding: 4px 2px;
    align-items: center;
  }
  .typing-indicator span {
    width: 7px; height: 7px;
    background: var(--c-muted);
    border-radius: 50%;
    animation: bounce .9s infinite;
  }
  .typing-indicator span:nth-child(2) { animation-delay: .18s; }
  .typing-indicator span:nth-child(3) { animation-delay: .36s; }
  @keyframes bounce {
    0%, 60%, 100% { transform: translateY(0); }
    30%           { transform: translateY(-6px); }
  }

  /* ── 診断カード ── */
  .diag-card {
    background: var(--c-surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    margin-top: 10px;
    width: min(460px, 75vw);
  }

  .verdict-banner {
    padding: 13px 15px;
    display: flex;
    align-items: center;
    gap: 11px;
  }
  .verdict-banner.OK      { background: var(--c-ok);   color: #fff; }
  .verdict-banner.WARNING { background: var(--c-warn); color: #fff; }
  .verdict-banner.NG      { background: var(--c-ng);   color: #fff; }
  .verdict-banner.UNKNOWN { background: var(--c-unk);  color: #fff; }

  .verdict-icon { font-size: 22px; flex-shrink: 0; line-height: 1; }
  .verdict-text h2 { font-size: 16px; font-weight: 700; }
  .verdict-text p  { font-size: 12px; opacity: .9; margin-top: 2px; }

  .checks-list { padding: 4px 0; }
  .check-item {
    display: flex;
    align-items: flex-start;
    gap: 9px;
    padding: 9px 13px;
    border-bottom: 1px solid var(--c-border);
    font-size: 13px;
  }
  .check-item:last-child { border-bottom: none; }
  .check-badge {
    font-size: 10px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 20px;
    flex-shrink: 0;
    margin-top: 1px;
    letter-spacing: .04em;
  }
  .badge-OK      { background: var(--c-ok-bg);   color: var(--c-ok);   border: 1px solid #bbf7d0; }
  .badge-WARNING { background: var(--c-warn-bg); color: var(--c-warn); border: 1px solid #fde68a; }
  .badge-NG      { background: var(--c-ng-bg);   color: var(--c-ng);   border: 1px solid #fecaca; }
  .badge-UNKNOWN { background: var(--c-unk-bg);  color: var(--c-unk);  border: 1px solid #e5e7eb; }
  .check-name   { font-weight: 600; margin-bottom: 2px; }
  .check-detail { color: var(--c-muted); line-height: 1.4; }

  /* ── 代替品カードグリッド ── */
  .alt-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
    margin-top: 10px;
    width: min(460px, 75vw);
  }
  .alt-product {
    background: var(--c-surface);
    border-radius: 10px;
    box-shadow: var(--shadow);
    padding: 11px 12px;
  }
  .alt-name {
    font-weight: 700;
    font-size: 13px;
    margin-bottom: 4px;
    line-height: 1.3;
  }
  .alt-specs {
    color: var(--c-muted);
    font-size: 11px;
    margin-bottom: 7px;
    line-height: 1.5;
  }
  .alt-links {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
  }
  .buy-btn {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 5px 9px;
    border-radius: 5px;
    font-size: 11px;
    font-weight: 700;
    border: none;
    color: #fff;
    text-decoration: none;
    cursor: pointer;
    transition: opacity .15s;
    white-space: nowrap;
  }
  .buy-btn:hover { opacity: .85; }
  .buy-btn-amazon  { background: #FF9900; }
  .buy-btn-rakuten { background: #BF0000; }

  /* ── フッター入力欄 ── */
  .chat-footer {
    flex-shrink: 0;
    background: var(--c-surface);
    border-top: 1px solid var(--c-border);
    padding: 10px 14px;
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }
  .chat-input {
    flex: 1;
    border: 1.5px solid var(--c-border);
    border-radius: 22px;
    padding: 10px 16px;
    font-size: 14px;
    font-family: inherit;
    resize: none;
    outline: none;
    line-height: 1.5;
    max-height: 120px;
    overflow-y: auto;
    transition: border-color .15s;
    background: #fff;
  }
  .chat-input:focus {
    border-color: var(--c-primary);
    box-shadow: 0 0 0 3px rgba(79,70,229,.1);
  }
  .chat-input::placeholder { color: var(--c-muted); }
  .chat-input:disabled { background: #f9fafb; }

  .btn-send {
    width: 42px; height: 42px;
    border-radius: 50%;
    background: linear-gradient(135deg, #4f46e5, #7c3aed);
    color: #fff;
    border: none;
    font-size: 18px;
    cursor: pointer;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: opacity .15s, transform .1s;
    line-height: 1;
  }
  .btn-send:hover  { opacity: .9; }
  .btn-send:active { transform: scale(.94); }
  .btn-send:disabled { opacity: .4; cursor: not-allowed; }

  /* ── 起動時カード ── */
  .mode-cards {
    display: flex;
    gap: 10px;
    margin-top: 12px;
  }
  .mode-card {
    flex: 1;
    background: var(--c-surface);
    border: 1.5px solid var(--c-border);
    border-radius: 12px;
    padding: 16px 12px;
    text-align: center;
    cursor: pointer;
    transition: border-color .15s, box-shadow .15s, transform .1s;
    font-size: 13px;
    font-weight: 600;
    line-height: 1.5;
  }
  .mode-card:hover {
    border-color: var(--c-primary);
    box-shadow: 0 2px 8px rgba(79,70,229,.15);
    transform: translateY(-2px);
  }
  .mode-card-icon {
    font-size: 28px;
    display: block;
    margin-bottom: 6px;
  }

  /* ── ゲームモード 推奨構成カード ── */
  .build-card {
    background: var(--c-surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 14px 16px;
    margin-top: 10px;
    width: min(460px, 75vw);
  }
  .build-game-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--c-primary);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .build-items { display: flex; flex-direction: column; gap: 8px; }
  .build-item {
    background: #f8f9ff;
    border-radius: 8px;
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .build-item-header {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .build-category {
    font-size: 10px;
    font-weight: 700;
    background: var(--c-primary);
    color: #fff;
    padding: 2px 7px;
    border-radius: 999px;
  }
  .build-name   { font-weight: 600; font-size: 13px; }
  .build-reason { font-size: 12px; color: var(--c-muted); }
  .build-price  { font-size: 12px; font-weight: 600; color: var(--c-ok); }
  .build-links  { display: flex; gap: 6px; margin-top: 4px; }
  .build-total {
    margin-top: 10px;
    padding-top: 8px;
    border-top: 1px solid var(--c-border);
    font-weight: 700;
    font-size: 14px;
  }
  .build-tip {
    margin-top: 8px;
    font-size: 12px;
    color: var(--c-warn);
    background: var(--c-warn-bg);
    border-radius: 8px;
    padding: 8px 10px;
  }

  @media (max-width: 480px) {
    .alt-grid { grid-template-columns: 1fr; }
    .diag-card, .alt-grid, .build-card { width: calc(100vw - 70px); }
    .chat-area { padding: 14px 12px 6px; }
    .mode-cards { flex-direction: column; }
  }
</style>
</head>
<body>

<div class="app">

  <header>
    <h1>何がしたい？</h1>
    <p>ゲーム・動画編集・作業PC、用途から最適なPCを提案します</p>
  </header>

  <div class="chat-area" id="chat-area"></div>

  <div class="chat-footer">
    <textarea
      class="chat-input"
      id="chat-input"
      placeholder="例: RTX 4070をLancool 216に入れたい"
      rows="1"
    ></textarea>
    <button class="btn-send" id="btn-send" title="送信">&#9658;</button>
  </div>

</div>

<script>
  // ─── アフィリエイト設定（サーバー側プレースホルダー注入） ──────────────
  const AMAZON_TAG   = '__AMAZON_TAG__';
  const RAKUTEN_A_ID = '__RAKUTEN_A_ID__';
  const RAKUTEN_L_ID = '__RAKUTEN_L_ID__';

  // ─── 定数 ──────────────────────────────────────────────────────────────
  const VERDICT_MAP = {
    OK:      { label: '互換性OK',  sub: 'すべてのチェックを通過しました',            icon: '✅', cls: 'OK'      },
    WARNING: { label: '要注意',    sub: '一部に互換性リスクがあります',               icon: '⚠️', cls: 'WARNING' },
    NG:      { label: '非互換',    sub: '組み立て不可能な組み合わせが含まれています', icon: '❌', cls: 'NG'      },
    UNKNOWN: { label: '判定不能',  sub: 'スペック情報が不足しています',               icon: '❓', cls: 'UNKNOWN' },
  };
  const STATUS_LABEL = { OK: 'OK', WARNING: 'WARN', NG: 'NG', UNKNOWN: '?' };

  // ─── 状態管理 ──────────────────────────────────────────────────────────
  let history = [];          // { role, content }[]
  let sending = false;
  let lastDiagnosis = null;  // { parts, diagnosis }
  let gameMode = false;      // ゲームモードフラグ

  // ─── 初期メッセージ ─────────────────────────────────────────────────────
  window.addEventListener('DOMContentLoaded', () => {
    const cardsHtml =
      '<div class="mode-cards">' +
        '<div class="mode-card" onclick="selectMode(\'game\')">' +
          '<span class="mode-card-icon">🎮</span>ゲームを<br>快適に遊びたい' +
        '</div>' +
        '<div class="mode-card" onclick="selectMode(\'compat\')">' +
          '<span class="mode-card-icon">🔧</span>パーツの<br>互換性を確認' +
        '</div>' +
      '</div>';
    appendAIBubble('まず何をしたいか教えてください', cardsHtml);
    adjustHeight();
  });

  function selectMode(mode) {
    document.querySelectorAll('.mode-card').forEach(c => {
      c.style.pointerEvents = 'none';
      c.style.opacity = '0.5';
    });
    if (mode === 'game') {
      gameMode = true;
      document.getElementById('chat-input').placeholder = '例: モンハンワイルズを60fpsで遊びたい。予算15万';
      appendAIBubble('🎮 どのゲームを、どんな目標でプレイしたいですか？\n予算も教えていただけると、より正確な構成を提案できます。\n\n例: モンハンワイルズを60fpsで遊びたい。予算15万円');
    } else {
      gameMode = false;
      document.getElementById('chat-input').placeholder = '例: RTX 4070をLancool 216に入れたい';
      appendAIBubble('どんな組み合わせを確認したいですか？\n例: RTX 4070をLancool 216に入れたい');
    }
  }

  // ─── イベント ──────────────────────────────────────────────────────────
  document.getElementById('btn-send').addEventListener('click', sendMessage);
  document.getElementById('chat-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  document.getElementById('chat-input').addEventListener('input', adjustHeight);

  // ─── メッセージ送信 ────────────────────────────────────────────────────
  async function sendMessage() {
    if (sending) return;
    const input = document.getElementById('chat-input');
    const msg = input.value.trim();
    if (!msg) return;

    appendUserBubble(msg);
    history.push({ role: 'user', content: msg });
    input.value = '';
    adjustHeight();
    setSending(true);
    const typingEl = appendTyping();

    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), 65000);

    try {
      const endpoint = gameMode ? '/api/recommend' : '/api/chat';
      const res = await fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: msg, history: history.slice(-10) }),
        signal: controller.signal,
      });
      clearTimeout(timer);
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error || 'HTTP ' + res.status);
      }
      const data = await res.json();
      typingEl.remove();
      history.push({ role: 'assistant', content: data.reply || '' });

      if (data.type === 'recommendation') {
        appendRecommendationMessage(data);
      } else if (data.type === 'diagnosis') {
        lastDiagnosis = { parts: data.parts, diagnosis: data.diagnosis };
        appendDiagnosisMessage(data);
      } else {
        appendAIBubble(data.reply || '少し詳しく教えてください。');
      }
    } catch (e) {
      clearTimeout(timer);
      typingEl.remove();
      if (e.name === 'AbortError') {
        appendAIBubble('⏱️ サーバーが起動中のため時間がかかっています。\nもう一度送信してください（2回目以降は速くなります）。');
      } else {
        appendAIBubble('⚠️ エラーが発生しました: ' + e.message);
      }
    } finally {
      setSending(false);
    }
  }

  // ─── チャット要素の追加 ────────────────────────────────────────────────
  function appendUserBubble(text) {
    const wrap = mkEl('div', 'msg user');
    wrap.innerHTML =
      '<div class="msg-avatar">👤</div>' +
      '<div class="msg-bubble">' + escHtml(text) + '</div>';
    chat().appendChild(wrap);
    scrollBottom();
  }

  function appendAIBubble(text, extraHtml) {
    const wrap = mkEl('div', 'msg ai');
    const inner = mkEl('div');
    const bubble = mkEl('div', 'msg-bubble');
    bubble.innerHTML = text.replace(/\n/g, '<br>');
    if (extraHtml) bubble.insertAdjacentHTML('beforeend', extraHtml);
    inner.appendChild(bubble);
    wrap.innerHTML = '<div class="msg-avatar">🤖</div>';
    wrap.appendChild(inner);
    chat().appendChild(wrap);
    scrollBottom();
    return wrap;
  }

  function appendTyping() {
    const wrap = mkEl('div', 'msg ai');
    wrap.innerHTML =
      '<div class="msg-avatar">🤖</div>' +
      '<div class="msg-bubble">' +
      '<div class="typing-indicator"><span></span><span></span><span></span></div>' +
      '</div>';
    chat().appendChild(wrap);
    scrollBottom();
    return wrap;
  }

  // ─── 診断結果メッセージ ────────────────────────────────────────────────
  function appendDiagnosisMessage(data) {
    const { reply, parts, diagnosis } = data;
    const verdict = diagnosis.verdict || 'UNKNOWN';
    const checks  = diagnosis.checks  || [];
    const summary = diagnosis.summary || '';
    const vm = VERDICT_MAP[verdict] || VERDICT_MAP.UNKNOWN;

    const checksHtml = checks.map(c => {
      const st = c.status || 'UNKNOWN';
      return '<div class="check-item">' +
        '<span class="check-badge badge-' + st + '">' + (STATUS_LABEL[st] || st) + '</span>' +
        '<div>' +
        '<div class="check-name">'   + escHtml(c.item   || '') + '</div>' +
        '<div class="check-detail">' + escHtml(c.detail || '') + '</div>' +
        '</div>' +
        '</div>';
    }).join('');

    const showAlt = verdict === 'NG' || verdict === 'WARNING';

    const diagHtml =
      '<div class="diag-card">' +
        '<div class="verdict-banner ' + vm.cls + '">' +
          '<span class="verdict-icon">' + vm.icon + '</span>' +
          '<div class="verdict-text">' +
            '<h2>' + vm.label + '</h2>' +
            '<p>' + escHtml(summary || vm.sub) + '</p>' +
          '</div>' +
        '</div>' +
        '<div class="checks-list">' + checksHtml + '</div>' +
      '</div>';

    appendAIBubble(
      escHtml(reply || parts.length + '件のパーツを診断しました。'),
      diagHtml
    );

    // NG/WARNING の場合、自動で代替品を両方取得して表示
    if (showAlt) {
      fetchAlternatives('gpu');
      fetchAlternatives('case');
    }
  }

  // ─── 代替品取得 ────────────────────────────────────────────────────────
  async function fetchAlternatives(category) {
    if (!lastDiagnosis) return;
    const { parts } = lastDiagnosis;

    const gpuName  = parts.find(p => /rtx|gtx|rx\s|arc\s|radeon|geforce/i.test(p))
                  || parts[0] || '';
    const caseName = parts.find(p =>
                       /lancool|lian.?li|nzxt|fractal|cooler.?master|corsair|phanteks|be.quiet|silencio|meshify|define|h[0-9]/i.test(p))
                  || parts[1] || '';

    const params = new URLSearchParams({ category });
    if (category === 'gpu'  && caseName) params.set('case_name', caseName);
    if (category === 'case' && gpuName)  params.set('gpu_name', gpuName);

    const typingEl = appendTyping();
    try {
      const res = await fetch('/api/alternatives?' + params.toString());
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      typingEl.remove();
      renderAlternatives(category, data.alternatives || []);
    } catch (e) {
      typingEl.remove();
      appendAIBubble('⚠️ 代替品の取得に失敗しました: ' + e.message);
    }
  }

  function renderAlternatives(category, items) {
    const label = category === 'gpu' ? 'GPU変更案' : 'ケース変更案';
    if (!items.length) {
      appendAIBubble('該当する' + (category === 'gpu' ? 'GPU' : 'ケース') + 'が見つかりませんでした。');
      return;
    }
    const cardsHtml = items.map(it => {
      const specs    = it.specs || {};
      const specStr  = buildSpecStr(category, specs);
      const amazonUrl  = it.amazon_url  || buildAmazonUrl(it.name);
      const rakutenUrl = it.rakuten_url || buildRakutenUrl(it.name);
      return '<div class="alt-product">' +
        '<div class="alt-name">'  + escHtml(it.name || '') + '</div>' +
        '<div class="alt-specs">' + escHtml(specStr)       + '</div>' +
        '<div class="alt-links">' +
          '<a class="buy-btn buy-btn-amazon"  href="' + escHtml(amazonUrl)  + '" target="_blank" rel="noopener">🛒 Amazon</a>' +
          '<a class="buy-btn buy-btn-rakuten" href="' + escHtml(rakutenUrl) + '" target="_blank" rel="noopener">🛍 楽天</a>' +
        '</div>' +
        '</div>';
    }).join('');

    const altWrap = appendAIBubble(
      '💡 代わりにこれはどうですか？ ' + label + '（' + items.length + '件）',
      '<div class="alt-grid">' + cardsHtml + '</div>'
    );
    // 代替品リストの先頭が見えるようにスクロール
    setTimeout(() => {
      if (altWrap) altWrap.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 150);
  }

  function buildSpecStr(category, specs) {
    const parts = [];
    if (category === 'gpu') {
      if (specs.length_mm)       parts.push(specs.length_mm + 'mm');
      if (specs.tdp_w)           parts.push(specs.tdp_w + 'W');
      if (specs.power_connector) parts.push(specs.power_connector);
    } else {
      if (specs.max_gpu_length_mm) parts.push('GPU最大 ' + specs.max_gpu_length_mm + 'mm');
      if (specs.form_factor)       parts.push(specs.form_factor);
    }
    return parts.join(' / ');
  }

  // ─── ゲームモード 推奨構成メッセージ ──────────────────────────────────
  function appendRecommendationMessage(data) {
    const game  = data.game  || {};
    const build = data.recommended_build || [];
    const total = data.total_estimate || '';
    const tip   = data.tip   || '';
    const reply = data.reply || '';

    // パーツカード HTML
    const itemsHtml = build.map(item => {
      const amazonUrl  = item.amazon_url  || buildAmazonUrl(item.name || '');
      const rakutenUrl = item.rakuten_url || buildRakutenUrl(item.name || '');
      return '<div class="build-item">' +
        '<div class="build-item-header">' +
          '<span class="build-category">' + escHtml(item.category || '') + '</span>' +
          '<span class="build-name">'     + escHtml(item.name     || '') + '</span>' +
        '</div>' +
        '<div class="build-reason">' + escHtml(item.reason     || '') + '</div>' +
        '<div class="build-price">'  + escHtml(item.price_range || '') + '</div>' +
        '<div class="build-links">' +
          '<a class="buy-btn buy-btn-amazon"  href="' + escHtml(amazonUrl)  + '" target="_blank" rel="noopener">🛒 Amazon</a>' +
          '<a class="buy-btn buy-btn-rakuten" href="' + escHtml(rakutenUrl) + '" target="_blank" rel="noopener">🛍 楽天</a>' +
        '</div>' +
        '</div>';
    }).join('');

    const totalHtml = total
      ? '<div class="build-total">💰 合計目安: ' + escHtml(total) + '</div>'
      : '';
    const tipHtml = tip
      ? '<div class="build-tip">💡 ' + escHtml(tip) + '</div>'
      : '';

    const cardHtml =
      '<div class="build-card">' +
        '<div class="build-game-title">🎮 ' + escHtml(game.name || 'ゲーム') + ' 推奨構成</div>' +
        '<div class="build-items">' + itemsHtml + '</div>' +
        totalHtml + tipHtml +
      '</div>';

    const msgWrap = appendAIBubble(reply, cardHtml);
    setTimeout(() => {
      if (msgWrap) msgWrap.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 150);
  }

  function buildAmazonUrl(name) {
    return 'https://www.amazon.co.jp/s?k=' + encodeURIComponent(name) + '&tag=' + AMAZON_TAG;
  }
  function buildRakutenUrl(name) {
    const search = 'https://search.rakuten.co.jp/search/mall/' + encodeURIComponent(name) + '/';
    if (RAKUTEN_A_ID && !RAKUTEN_A_ID.startsWith('__')) {
      return 'https://hb.afl.rakuten.co.jp/hgc/' + RAKUTEN_A_ID + '/' + RAKUTEN_L_ID +
             '/?pc=' + encodeURIComponent(search);
    }
    return search;
  }

  // ─── ユーティリティ ────────────────────────────────────────────────────
  function chat() { return document.getElementById('chat-area'); }
  function mkEl(tag, cls) {
    const el = document.createElement(tag);
    if (cls) el.className = cls;
    return el;
  }
  function scrollBottom() {
    const c = chat();
    setTimeout(() => { c.scrollTop = c.scrollHeight; }, 40);
  }
  function setSending(on) {
    sending = on;
    document.getElementById('btn-send').disabled  = on;
    document.getElementById('chat-input').disabled = on;
  }
  function escHtml(str) {
    if (!str) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
  function adjustHeight() {
    const ta = document.getElementById('chat-input');
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
  }
</script>

</body>
</html>
