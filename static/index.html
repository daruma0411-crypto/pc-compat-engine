<!-- ── 履歴ドロワー ── -->
<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer(event)">
  <div class="drawer">
    <div class="drawer-header">
      <h2>📋 履歴</h2>
      <button class="btn-drawer-close" onclick="toggleDrawer()">✕</button>
    </div>
    <button class="btn-new-chat" onclick="newChat()">＋ 新しいチャット</button>
    <div class="drawer-list" id="drawer-list"></div>
  </div>
</div>

<div class="app">

  <header>
    <button class="btn-menu" onclick="toggleDrawer()" title="履歴を開く">☰</button>
    <div class="header-logo">🖥️</div>
    <div class="header-title">
      <h1>PC自作、もう迷わない</h1>
      <p class="subtitle">14,000件の互換性データ × AIショップ店員</p>
    </div>
    <button class="btn-mode-switch" id="btn-mode-switch" onclick="switchMode()" title="モードを切り替え"></button>
  </header>

  <!-- メインコンテナ: 左右2パネル -->
  <div class="main-container">
    
    <!-- 左パネル: チャット -->
    <div class="chat-panel">
      <div class="chat-messages" id="chat"></div>
      
      <!-- 入力エリア -->
      <div class="chat-input-area">
        <div class="chat-reset-row">
          <button id="btn-reset-all" onclick="resetAll()" title="構成をリセットして最初から相談">💡 最初から相談する</button>
        </div>
        <div class="chat-input-row">
          <textarea id="chat-input" placeholder="用途や予算、パーツ名など..." rows="1"></textarea>
          <button id="btn-send" aria-label="送信">▶</button>
        </div>
      </div>
    </div>

    <!-- 右パネル: ダッシュボード -->
    <div class="dashboard-panel" id="dashboard">
      
      <!-- パーツ一覧テーブル -->
      <div class="dashboard-section parts-table" id="parts-table">
        <h2 class="dashboard-title">📋 構成パーツ</h2>
        <div id="parts-list-content">
          <div class="parts-row"><span class="parts-category">GPU</span><span class="parts-name parts-name--empty" id="part-val-gpu">—</span><span class="parts-price" id="part-price-gpu">—</span><span class="parts-buy" id="part-buy-gpu"></span></div>
          <div class="parts-row"><span class="parts-category">CPU</span><span class="parts-name parts-name--empty" id="part-val-cpu">—</span><span class="parts-price" id="part-price-cpu">—</span><span class="parts-buy" id="part-buy-cpu"></span></div>
          <div class="parts-row"><span class="parts-category">RAM</span><span class="parts-name parts-name--empty" id="part-val-ram">—</span><span class="parts-price" id="part-price-ram">—</span><span class="parts-buy" id="part-buy-ram"></span></div>
          <div class="parts-row"><span class="parts-category">MB</span><span class="parts-name parts-name--empty" id="part-val-mb">—</span><span class="parts-price" id="part-price-mb">—</span><span class="parts-buy" id="part-buy-mb"></span></div>
          <div class="parts-row"><span class="parts-category">PSU</span><span class="parts-name parts-name--empty" id="part-val-psu">—</span><span class="parts-price" id="part-price-psu">—</span><span class="parts-buy" id="part-buy-psu"></span></div>
          <div class="parts-row"><span class="parts-category">CASE</span><span class="parts-name parts-name--empty" id="part-val-case">—</span><span class="parts-price" id="part-price-case">—</span><span class="parts-buy" id="part-buy-case"></span></div>
          <div class="parts-total-row"><span class="parts-total-label">合計</span><span class="parts-total-price" id="part-total-price">—</span></div>
        </div>
      </div>

      <!-- レーダーチャート（ゲームモード時） -->
      <div class="dashboard-section radar-chart" id="radar-chart-section" style="display: none;">
        <h2 class="dashboard-title">📊 性能バランス</h2>
        <canvas id="radar-chart" width="300" height="300"></canvas>
      </div>

      <!-- 互換性ステータス（互換チェックモード時） -->
      <div class="dashboard-section compat-status" id="compat-status-section" style="display: none;">
        <h2 class="dashboard-title">🔧 互換性チェック</h2>
        <div id="compat-status-content">
          <!-- 動的に生成 -->
        </div>
      </div>

      <!-- 完成イメージエリア（チャット内に統合済み・非表示） -->
      <div id="image-area" style="display:none;"></div>

      <!-- 購入エリア（状態C時のみ表示） -->
      <div class="dashboard-section purchase-area" id="purchase-area" style="display: none;">
        <button class="btn-purchase-main" onclick="handleBulkPurchase()">

          <div id="individual-links">
            <!-- 動的に生成 -->
          </div>
        </details>
      </div>

    </div>
